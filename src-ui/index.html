<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reveille</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>🌅 Reveille</h1>
      <p id="message" class="banner hidden"></p>

      <section id="status-card">
        <div id="state">Idle</div>
        <div id="population" class="hidden"></div>
      </section>

      <button id="seed-btn">Seed</button>
      <button id="restore-btn" class="secondary">Restore my normal settings</button>

      <p id="error" class="error hidden"></p>
    </main>
    <script src="app.js"></script>
  </body>
</html>
