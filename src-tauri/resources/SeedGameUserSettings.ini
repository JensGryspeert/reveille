;SEED_MODE
; Reveille seed-mode GameUserSettings.ini — written OVER the user's real settings
; while seeding; their real file is backed up first and restored on exit (settings.rs).
;
; Trimmed from the battle-tested Matsozetex/Squad-Seed-Tool config down to the keys
; that actually matter for seeding: resolution, graphics/scalability, performance, and
; audio. Input (sensitivities, control modes), emotes, benchmark scores, and server-
; browser prefs were dropped so a seed session doesn't temporarily reshuffle the
; member's controls. Reveille additions: FullscreenMode=1 (borderless) so the always-
; on-top banner stays visible. PlayerNamePrefix tags seeders for server admins.

[D3DRHIPreference]
bUseD3D12InGame=False

[/Script/Squad.SQGameUserSettings]
PlayerNamePrefix="SEED"

; --- Audio off ---
MasterVolume=0.000000
EffectsVolume=0.000000
UIVolume=0.000000
MusicVolume=0.000000
LastConfirmedAudioQualityLevel=3

; --- Resolution / window ---
ResolutionSizeX=1024
ResolutionSizeY=768
