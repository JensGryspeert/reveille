; Reveille seed-mode GameUserSettings.ini
; Ultra-low-resource config written OVER the user's real settings while seeding.
; The user's real file is backed up first and restored on exit (see settings.rs).
;
; NOTE: these keys/values are a starting point and MUST be verified against a
; current Squad install on Windows. FullscreenMode=1 = borderless windowed,
; which is REQUIRED so the always-on-top seed banner stays visible (and so
; alt-tabbing stays painless). Never use exclusive fullscreen (0) here.

[/Script/Engine.GameUserSettings]
bUseVSync=False
bUseDynamicResolution=False
ResolutionSizeX=1024
ResolutionSizeY=768
LastUserConfirmedResolutionSizeX=1024
LastUserConfirmedResolutionSizeY=768
WindowPosX=-1
WindowPosY=-1
FullscreenMode=1
LastConfirmedFullscreenMode=1
PreferredFullscreenMode=1
Version=5
FrameRateLimit=10.000000

[ScalabilityGroups]
sg.ResolutionQuality=25
sg.ViewDistanceQuality=0
sg.AntiAliasingQuality=0
sg.ShadowQuality=0
sg.PostProcessQuality=0
sg.TextureQuality=0
sg.EffectsQuality=0
sg.FoliageQuality=0
sg.ShadingQuality=0

[/Script/Squad.SQGameUserSettings]
MasterVolume=0.000000
EffectsVolume=0.000000
UIVolume=0.000000
MusicVolume=0.000000
VoiceVolume=0.000000
MenuFrameRateLimit=20.000000
