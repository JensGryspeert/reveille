name: Release

# Build the Windows installer and publish a GitHub Release (with the updater
# latest.json) on every version tag. macOS cannot cross-build Tauri for Windows,
# so this always runs on a Windows runner.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm install

      - name: Build + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — generate once with `npm run tauri signer generate`
          # and store the private key + password as repo secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Reveille ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          # Produces the updater artifacts + latest.json the app polls.
          includeUpdaterJson: true
